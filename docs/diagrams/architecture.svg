<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill:#0b0f14; }
    .box { fill:#121821; stroke:#ff9f1c; stroke-width:2; rx:10; }
    .text { fill:#e6edf3; font-family:monospace; font-size:14px; }
    .arrow { stroke:#ff9f1c; stroke-width:2; marker-end:url(#arrow); }
  </style>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ff9f1c"></polygon>
    </marker>
  </defs>

  <rect class="bg" width="100%" height="100%"></rect>

  <rect class="box" x="300" y="40" width="300" height="50"></rect>
  <text class="text" x="450" y="70" text-anchor="middle">LLM Runtime (vLLM / TRT / PyTorch)</text>

  <rect class="box" x="300" y="110" width="300" height="50"></rect>
  <text class="text" x="450" y="140" text-anchor="middle">mem_hint (userspace)</text>

  <rect class="box" x="300" y="180" width="300" height="50"></rect>
  <text class="text" x="450" y="210" text-anchor="middle">/dev/mem_hint</text>

  <rect class="box" x="300" y="250" width="300" height="60"></rect>
  <text class="text" x="450" y="280" text-anchor="middle">Kernel Driver</text>
  <text class="text" x="450" y="300" text-anchor="middle">(Policy + Safety)</text>

  <rect class="box" x="300" y="330" width="300" height="50"></rect>
  <text class="text" x="450" y="360" text-anchor="middle">MSR | MMIO | CXL</text>

  <rect class="box" x="300" y="400" width="300" height="50"></rect>
  <text class="text" x="450" y="430" text-anchor="middle">Memory Controller / PHY</text>

  <line class="arrow" x1="450" y1="90" x2="450" y2="110"></line>
  <line class="arrow" x1="450" y1="160" x2="450" y2="180"></line>
  <line class="arrow" x1="450" y1="230" x2="450" y2="250"></line>
  <line class="arrow" x1="450" y1="310" x2="450" y2="330"></line>
  <line class="arrow" x1="450" y1="380" x2="450" y2="400"></line>
</svg>