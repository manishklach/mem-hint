name: build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  kernel-and-python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-pip
          sudo apt-get install -y linux-headers-$(uname -r) || \
            sudo apt-get install -y linux-headers-generic || \
            echo "warning: Linux headers unavailable; kernel build will be validated best-effort"
          python3 -m pip install --upgrade pip flake8

      - name: Python syntax check
        run: python3 -m py_compile userspace/python/mem_hint/*.py userspace/python/mem_hint_cli.py

      - name: Lint Python package
        run: flake8 userspace/python

      - name: Validate repository
        run: bash scripts/validate_repo.sh
