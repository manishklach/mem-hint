name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  kernel-build:
    name: Kernel Module Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kernel headers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            linux-headers-$(uname -r) 2>/dev/null || \
          sudo apt-get install -y linux-headers-generic

      - name: Resolve kernel dir
        id: kdir
        run: |
          KVER=$(ls /usr/src/ | grep 'linux-headers' | \
                 grep -v generic | tail -1 | \
                 sed 's/linux-headers-//')
          [ -z "$KVER" ] && KVER=$(uname -r)
          KDIR="/usr/src/linux-headers-${KVER}"
          echo "kdir=$KDIR" >> $GITHUB_OUTPUT
          echo "Resolved KDIR=$KDIR"
          ls "$KDIR" || echo "WARN: KDIR not found"

      - name: Build kernel module
        run: |
          cd kernel
          make KDIR=${{ steps.kdir.outputs.kdir }} 2>&1
        continue-on-error: false

      - name: Verify .ko produced
        run: ls -la kernel/*.ko && echo "Build OK"

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install flake8
      - run: |
          flake8 userspace/python/ \
            --max-line-length=100 \
            --exclude=__pycache__,.eggs,*.egg-info \
            --ignore=E501,W503

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}

      - name: Install package
        run: pip install -e userspace/python/

      - name: Import test
        run: |
          python3 -c "
          from mem_hint import MemHintClient, MemHintScheduler
          from mem_hint.phases import (PHASE_PREFILL, PHASE_DECODE,
              PHASE_AGENTIC, PHASE_IDLE, PHASE_FORWARD, PHASE_BACKWARD,
              PHASES)
          assert len(PHASES) == 6
          print('Imports OK, phases:', len(PHASES))
          "

      - name: Struct size test
        run: |
          python3 -c "
          import struct
          h = struct.pack('<BHHBB2s', 2, 90, 150, 0, 7, b'\x00\x00')
          assert len(h) == 9, f'Got {len(h)}'
          print('Struct 9 bytes OK')
          "

      - name: Dry-run test
        run: |
          python3 -c "
          import logging; logging.basicConfig(level=logging.DEBUG)
          from mem_hint import MemHintClient, MemHintScheduler
          with MemHintClient(dry_run=True) as c:
              c.prefill(); c.decode(); c.agentic(); c.idle()
              c.forward_pass(); c.backward_pass()
          with MemHintScheduler(dry_run=True) as s:
              s.on_prefill_start(32)
              s.on_decode_start('req-1')
              s.on_tool_call('search')
              s.on_idle()
              s.on_forward_pass(16)
              s.on_backward_pass(1)
          print('Dry-run scheduler OK')
          "

      - name: Phase data test
        run: |
          python3 -c "
          from mem_hint.phases import PHASES, PHASE_DECODE
          p = PHASES[PHASE_DECODE]
          assert p.latency_target_ns == 90
          assert p.bw_target_gbps == 150
          assert p.name == 'Decode'
          print('Phase data OK:', p)
          "
