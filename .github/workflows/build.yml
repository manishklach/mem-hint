name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  kernel-build:
    name: Kernel Module Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kernel headers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            linux-headers-$(uname -r) 2>/dev/null || \
          sudo apt-get install -y linux-headers-generic

      - name: Resolve KDIR
        id: kdir
        run: |
          KVER=$(ls /usr/src/ | grep 'linux-headers' | \
                 grep -v generic | tail -1 | \
                 sed 's/linux-headers-//')
          [ -z "$KVER" ] && KVER=$(uname -r)
          KDIR="/usr/src/linux-headers-${KVER}"
          echo "kdir=$KDIR" >> $GITHUB_OUTPUT
          ls "$KDIR" && echo "KDIR OK" || \
            echo "WARN: KDIR not found, build may fail"

      - name: Build kernel module
        run: make -C kernel KDIR=${{ steps.kdir.outputs.kdir }}

      - name: Verify .ko produced
        run: ls -la kernel/*.ko && echo "Build OK"

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install flake8
      - run: |
          flake8 userspace/python/ \
            --max-line-length=100 \
            --exclude=__pycache__,.eggs,*.egg-info \
            --ignore=E501,W503

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}

      - name: Install package
        run: pip install -e userspace/python/ --quiet

      - name: Import test
        run: |
          python3 -c "
          from mem_hint import MemHintClient, MemHintScheduler
          from mem_hint.phases import PHASES, PHASE_DECODE
          assert len(PHASES) == 6
          assert PHASES[PHASE_DECODE].latency_target_ns == 90
          print('Imports and phase data OK')
          "

      - name: Struct size test
        run: |
          python3 -c "
          import struct
          h = struct.pack('<BHHBBB', 2, 90, 150, 0, 7, 0)
          assert len(h) == 8, f'Expected 8 bytes, got {len(h)}'
          print('Struct 8 bytes OK')
          "

      - name: Dry-run client test
        run: |
          python3 -c "
          from mem_hint import MemHintClient
          with MemHintClient(dry_run=True) as c:
              c.prefill(); c.decode(); c.agentic()
              c.idle(); c.forward_pass(); c.backward_pass()
          print('MemHintClient dry_run OK')
          "

      - name: Dry-run scheduler test
        run: |
          python3 -c "
          from mem_hint import MemHintScheduler
          with MemHintScheduler(dry_run=True) as s:
              s.on_prefill_start(32)
              s.on_decode_start('req-1')
              s.on_tool_call('search')
              s.on_idle()
              s.on_forward_pass(16)
              s.on_backward_pass(1)
          print('MemHintScheduler dry_run OK')
          "
